<!-- Aperture/lens mark: overlapping concentric arcs form a stylized lens; horizontal rule strokes evoke code lines -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Outer lens ring -->
  <circle cx="32" cy="32" r="28" stroke="#1e4d8c" stroke-width="3.5"/>
  <!-- Inner lens ring -->
  <circle cx="32" cy="32" r="18" stroke="#1e4d8c" stroke-width="2.5"/>
  <!-- Focal point dot (accent) -->
  <circle cx="32" cy="32" r="4" fill="#d4a017"/>
  <!-- Code-line strokes layered across the lens (left side) -->
  <line x1="10" y1="26" x2="22" y2="26" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="8"  y1="32" x2="14" y2="32" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="38" x2="22" y2="38" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <!-- Code-line strokes layered across the lens (right side) -->
  <line x1="42" y1="26" x2="54" y2="26" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="38" x2="54" y2="38" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <!-- Aperture blade hints (four short arcs represented as short lines at 45°) -->
  <line x1="19" y1="19" x2="24" y2="24" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="19" x2="40" y2="24" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="45" x2="24" y2="40" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="45" x2="40" y2="40" stroke="#1e4d8c" stroke-width="2" stroke-linecap="round"/>
</svg>
