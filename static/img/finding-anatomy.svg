<!-- Anatomy of a single codelens terminal finding: labels each element of the two-line output -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="Anatomy of a codelens finding">

  <!-- Background surface -->
  <rect width="800" height="340" rx="8" fill="#f0f4f9"/>

  <!-- Finding text box -->
  <rect x="40" y="40" width="720" height="76" rx="6" fill="#1e1e2e" stroke="#4b5a72" stroke-width="1.5"/>

  <!-- Line 1 of the finding -->
  <text x="60" y="72" font-family="monospace" font-size="17" fill="#cdd6f4">
    <tspan fill="#89b4fa">[MAINT001-cyclomatic]</tspan>
    <tspan fill="#f38ba8"> medium </tspan>
    <tspan fill="#a6e3a1"> src/lib.rs:42:1</tspan>
  </text>

  <!-- Line 2 of the finding -->
  <text x="60" y="100" font-family="monospace" font-size="17" fill="#cdd6f4">
    <tspan>  function `process_request` has cyclomatic complexity 14 (threshold 10)</tspan>
  </text>

  <!-- Label: rule_id -->
  <line x1="150" y1="116" x2="150" y2="164" stroke="#1e4d8c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="60" y="164" width="180" height="34" rx="4" fill="#1e4d8c"/>
  <text x="150" y="186" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">rule_id</text>

  <!-- Label: severity -->
  <line x1="295" y1="116" x2="295" y2="216" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="228" y="216" width="134" height="34" rx="4" fill="#d4a017"/>
  <text x="295" y="238" font-family="sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">severity</text>

  <!-- Label: file:line:col -->
  <line x1="460" y1="116" x2="460" y2="164" stroke="#1e4d8c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="381" y="164" width="158" height="34" rx="4" fill="#1e4d8c"/>
  <text x="460" y="186" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">file : line : col</text>

  <!-- Label: dimension (pulled from rule_id prefix) -->
  <line x1="640" y1="128" x2="640" y2="216" stroke="#4b5a72" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="560" y="216" width="160" height="34" rx="4" fill="#4b5a72"/>
  <text x="640" y="238" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">dimension (prefix)</text>

  <!-- Arrow for message line -->
  <line x1="380" y1="116" x2="380" y2="282" stroke="#4b5a72" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="280" y="282" width="200" height="34" rx="4" fill="#4b5a72"/>
  <text x="380" y="304" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">message</text>

  <!-- Dimension label note -->
  <text x="640" y="270" font-family="sans-serif" font-size="11" fill="#4b5a72" text-anchor="middle">MAINT → Maintainability</text>

</svg>
