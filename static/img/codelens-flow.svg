<!-- Analysis pipeline: source files → parse → analyzers → multi-dimensional findings → report -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" fill="#f0f4f9" rx="12"/>

  <!-- ── Stage boxes ── -->
  <!-- 1: Source Files -->
  <rect x="30" y="150" width="120" height="100" rx="8" fill="#1e4d8c"/>
  <!-- file icon lines inside box -->
  <rect x="52" y="168" width="50" height="64" rx="3" fill="#2a5fa8"/>
  <line x1="59" y1="182" x2="95" y2="182" stroke="#93b8e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="191" x2="95" y2="191" stroke="#93b8e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="200" x2="80" y2="200" stroke="#93b8e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="209" x2="88" y2="209" stroke="#93b8e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="218" x2="76" y2="218" stroke="#93b8e0" stroke-width="2" stroke-linecap="round"/>
  <text x="90" y="268" font-family="system-ui,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Source</text>
  <text x="90" y="283" font-family="system-ui,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Files</text>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="200" x2="188" y2="200" stroke="#1e4d8c" stroke-width="2.5"/>
  <polygon points="188,194 200,200 188,206" fill="#1e4d8c"/>

  <!-- 2: Parse -->
  <rect x="200" y="150" width="120" height="100" rx="8" fill="#1e4d8c"/>
  <!-- parse icon: bracket shapes -->
  <text x="220" y="210" font-family="monospace,system-ui" font-size="32" fill="#93b8e0">{</text>
  <text x="285" y="210" font-family="monospace,system-ui" font-size="32" fill="#93b8e0">}</text>
  <text x="260" y="268" font-family="system-ui,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Parse</text>
  <text x="260" y="283" font-family="system-ui,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">&amp; Index</text>

  <!-- Arrow 2→3 -->
  <line x1="322" y1="200" x2="358" y2="200" stroke="#1e4d8c" stroke-width="2.5"/>
  <polygon points="358,194 370,200 358,206" fill="#1e4d8c"/>

  <!-- 3: Analyzers -->
  <rect x="370" y="130" width="140" height="140" rx="8" fill="#163c6e"/>
  <!-- gear-like dots arrangement -->
  <circle cx="424" cy="185" r="6" fill="#d4a017"/>
  <circle cx="440" cy="200" r="6" fill="#d4a017"/>
  <circle cx="456" cy="185" r="6" fill="#d4a017"/>
  <circle cx="424" cy="215" r="6" fill="#5b8def"/>
  <circle cx="456" cy="215" r="6" fill="#5b8def"/>
  <text x="440" y="268" font-family="system-ui,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Analyzers</text>
  <text x="440" y="283" font-family="system-ui,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">(25 rules)</text>

  <!-- Arrow 3→4 -->
  <line x1="512" y1="200" x2="548" y2="200" stroke="#1e4d8c" stroke-width="2.5"/>
  <polygon points="548,194 560,200 548,206" fill="#1e4d8c"/>

  <!-- 4: Findings (5 dimension cards stacked) -->
  <rect x="560" y="120" width="130" height="24" rx="4" fill="#b91c1c" opacity="0.85"/>
  <text x="625" y="136" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Security</text>

  <rect x="560" y="150" width="130" height="24" rx="4" fill="#0369a1" opacity="0.85"/>
  <text x="625" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Maintainability</text>

  <rect x="560" y="180" width="130" height="24" rx="4" fill="#7c3aed" opacity="0.85"/>
  <text x="625" y="196" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Complexity</text>

  <rect x="560" y="210" width="130" height="24" rx="4" fill="#047857" opacity="0.85"/>
  <text x="625" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Documentation</text>

  <rect x="560" y="240" width="130" height="24" rx="4" fill="#b45309" opacity="0.85"/>
  <text x="625" y="256" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Test Smell</text>

  <text x="625" y="283" font-family="system-ui,sans-serif" font-size="12" fill="#1e4d8c" text-anchor="middle">Findings</text>
  <text x="625" y="298" font-family="system-ui,sans-serif" font-size="12" fill="#1e4d8c" text-anchor="middle">by dimension</text>

  <!-- Arrow 4→5 -->
  <line x1="692" y1="200" x2="718" y2="200" stroke="#1e4d8c" stroke-width="2.5"/>
  <polygon points="718,194 730,200 718,206" fill="#1e4d8c"/>

  <!-- 5: Report -->
  <rect x="730" y="150" width="40" height="100" rx="6" fill="#1e4d8c"/>
  <!-- score bars -->
  <rect x="736" y="156" width="28" height="8" rx="2" fill="#d4a017"/>
  <rect x="736" y="170" width="20" height="8" rx="2" fill="#5b8def"/>
  <rect x="736" y="184" width="24" height="8" rx="2" fill="#5b8def"/>
  <rect x="736" y="198" width="16" height="8" rx="2" fill="#5b8def"/>
  <rect x="736" y="212" width="26" height="8" rx="2" fill="#5b8def"/>
  <text x="750" y="268" font-family="system-ui,sans-serif" font-size="12" fill="#1e4d8c" text-anchor="middle">Report</text>

  <!-- Stage labels at top -->
  <text x="90"  y="138" font-family="system-ui,sans-serif" font-size="11" fill="#4b6b99" text-anchor="middle" font-weight="600">①</text>
  <text x="260" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#4b6b99" text-anchor="middle" font-weight="600">②</text>
  <text x="440" y="118" font-family="system-ui,sans-serif" font-size="11" fill="#4b6b99" text-anchor="middle" font-weight="600">③</text>
  <text x="625" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#4b6b99" text-anchor="middle" font-weight="600">④</text>
  <text x="750" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#4b6b99" text-anchor="middle" font-weight="600">⑤</text>

  <!-- Title -->
  <text x="400" y="360" font-family="system-ui,sans-serif" font-size="14" fill="#1e4d8c" text-anchor="middle" font-weight="600">codelens analysis pipeline</text>
</svg>
